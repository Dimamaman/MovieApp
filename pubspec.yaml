name: moviecatalogue
description: A new Flutter application.
version: 1.2.1+4

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # This is our modular
  core:
    path: core/core
  dependencies:
    path: libraries/dependencies
  shared:
    path: common/common
  feature_movie:
    path: features/movie
  feature_tv_show:
    path: features/tv_show
  feature_detail:
    path: features/detail
  feature_setting:
    path: features/setting

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_driver:
    sdk: flutter
  test: any
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/movie_icon.png"
  build_runner: any

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/json/

  fonts:
    - family: IBMPlexSans
      fonts:
        - asset: assets/fonts/IBMPlexSans-Regular.ttf
        - asset: assets/fonts/IBMPlexSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/IBMPlexSans-Italic.ttf
          style: italic
        - asset: assets/fonts/IBMPlexSans-Light.ttf
          weight: 300
        - asset: assets/fonts/IBMPlexSans-SemiBold.ttf
          weight: 600